[Rainmeter]
Update=1000
AccurateText=1
DynamicWindowSize=1
BackgroundMode=2
SolidColor=0,0,0,1

[Metadata]
Name=FootballHub
Author=Parsa Rasouli
Information=Modern football scoreboard for Rainmeter with live scores, scorers, and multi-league support
Version=1.0

[Variables]
@Include=#@#Data.inc
FontMain=Segoe UI
FontBold=Segoe UI Semibold
FontMono=Consolas
Text=245,247,250,255
Muted=170,180,195,255
Accent=86,182,255,255
Accent2=110,92,255,255
Green=60,220,140,255
Orange=255,180,90,255
Card=18,24,38,225
Panel=10,14,24,210
Line=255,255,255,22
Scale=1
FontS8=8
FontS9=9
FontS10=10
FontS12=12
FontS14=14
FontS18=18

; ==========================
; Refresh command
; ==========================
[MeasureMinuteRefresh]
Measure=Time
Format=%M
OnChangeAction=["C:\Windows\System32\wscript.exe" "#@#Refresh-FootballHub.vbs" "auto"]

; ==========================
; Main background
; ==========================
[MeasurePanelH]
Measure=Calc
Formula=#PanelH#
DynamicVariables=1

[MeterPanel]
Meter=Shape
Shape=Rectangle 0,0,560,[MeasurePanelH],22 | Fill Color #Panel# | StrokeWidth 1 | Stroke Color #Line#
DynamicVariables=1

[MeterHeader]
Meter=String
X=22
Y=18
FontFace=#FontBold#
FontSize=18
FontColor=#Text#
AntiAlias=1
Text=Football Hub

[MeterSub]
Meter=String
X=22
Y=46
FontFace=#FontMain#
FontSize=10
FontColor=#Muted#
AntiAlias=1
Text=Today's matches + scorers

[MeterUpdated]
Meter=String
X=530
Y=22
W=120
H=16
StringAlign=Right
FontFace=#FontMain#
FontSize=9
FontColor=#Muted#
AntiAlias=1
DynamicVariables=1
Text=#LastUpdated#

[MeterRefreshBtnBg]
Meter=Shape
Shape=Rectangle 430,44,108,28,12 | Fill Color 255,255,255,18 | StrokeWidth 1 | Stroke Color 255,255,255,32
LeftMouseUpAction=["C:\Windows\System32\wscript.exe" "#@#Refresh-FootballHub.vbs"]

[MeterRefreshBtn]
Meter=String
X=484
Y=50
StringAlign=Center
FontFace=#FontBold#
FontSize=10
FontColor=#Text#
AntiAlias=1
Text=Refresh
LeftMouseUpAction=["C:\Windows\System32\wscript.exe" "#@#Refresh-FootballHub.vbs"]

